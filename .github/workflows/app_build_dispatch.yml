name: Build Dispatch

on:
  workflow_dispatch:
    inputs:
      os-version:
        description: "Operating system version"
        type: choice
        options:
          - windows-latest
          - macos-latest
        default: windows-latest
      project-pareto-repo:
        description: "Project PARETO repository to build from"
        type: string
        default: project-pareto/project-pareto
      project-pareto-branch:
        description: "Branch or tag for the Project PARETO repository"
        type: string
        default: main
      project-pareto-version:
        type: string
        default: '1.1.0'
      sign-distribution:
        description: "Whether to sign the build output."
        type: boolean
        default: true
      package-build-number:
        description: "Package build number (optional). Will be autogenerated based on the date if not provided."
        type: string
      windows-installer-target:
        description: "Windows installer target. This will only affect windows builds."
        type: choice
        options:
          - nsis
          - portable
          - zip
        default: nsis

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      job-name: ${{ steps.generate-dynamic-inputs.outputs.job-name }}
      os: ${{ steps.generate-dynamic-inputs.outputs.os }}
    steps:
      - name: Log workflow inputs
        env:
          INPUT_OS_VERSION: ${{ inputs.os-version }}
          INPUT_PARETO_UI_BRANCH: ${{ github.ref_name }}
          INPUT_PROJECT_PARETO_REPO: ${{ inputs.project-pareto-repo }}
          INPUT_PROJECT_PARETO_BRANCH: ${{ inputs.project-pareto-branch }}
          INPUT_PROJECT_PARETO_VERSION: ${{ inputs.project-pareto-version }}
          INPUT_PACKAGE_BUILD_NUMBER: ${{ inputs.package-build-number }}
          INPUT_SIGN_DISTRIBUTION: ${{ inputs.sign-distribution }}
          INPUT_WINDOWS_INSTALLER_TARGET: ${{ inputs.windows-installer-target }}
        run: |
          echo "=================================================="
          echo "Build Dispatch Inputs"
          echo "=================================================="
          echo "os-version: ${INPUT_OS_VERSION}"
          echo "pareto-ui-branch: ${INPUT_PARETO_UI_BRANCH}"
          echo "project-pareto-repo: ${INPUT_PROJECT_PARETO_REPO}"
          echo "project-pareto-branch: ${INPUT_PROJECT_PARETO_BRANCH}"
          echo "project-pareto-version: ${INPUT_PROJECT_PARETO_VERSION}"
          if [ -z "${INPUT_PACKAGE_BUILD_NUMBER}" ]; then
            echo "package-build-number: (empty, will be auto-generated)"
          else
            echo "package-build-number: ${INPUT_PACKAGE_BUILD_NUMBER}"
          fi
          echo "sign-distribution: ${INPUT_SIGN_DISTRIBUTION}"
          echo "windows-installer-target: ${INPUT_WINDOWS_INSTALLER_TARGET}"
          echo "=================================================="

      - name: Generate dynamic inputs
        id: generate-dynamic-inputs
        run: |
          if [ "${{ inputs.os-version }}" == "windows-latest" ]; then
            echo "job-name=build ${{ inputs.windows-installer-target }}" >> $GITHUB_OUTPUT
            echo "os=windows" >> $GITHUB_OUTPUT
          else
            echo "job-name=build dmg" >> $GITHUB_OUTPUT
            echo "os=mac" >> $GITHUB_OUTPUT
          fi

  electron-build:
    needs: prepare
    uses: ./.github/workflows/app_build.yml
    name: ${{ needs.prepare.outputs.os }}
    with:
      job-name:  ${{ needs.prepare.outputs.job-name }}
      os-version: ${{ inputs.os-version }}
      package-build-number: ${{ inputs.package-build-number }}
      sign-distribution: ${{ inputs.sign-distribution }}
      project-pareto-repo: ${{ inputs.project-pareto-repo }}
      project-pareto-branch: ${{ inputs.project-pareto-branch }}
      project-pareto-version: ${{ inputs.project-pareto-version }}
      windows-installer-target: ${{ inputs.windows-installer-target }}
    secrets: inherit
